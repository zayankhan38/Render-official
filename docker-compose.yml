version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: render_postgres
    environment:
      POSTGRES_USER: render_user
      POSTGRES_PASSWORD: render_password_dev
      POSTGRES_DB: render_dev
    ports:
      - "5432:5432"
    volumes:
      - render_postgres_data:/var/lib/postgresql/data
      - ./backend/go/migrations:/docker-entrypoint-initdb.d
    networks:
      - render_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U render_user -d render_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: render_redis
    ports:
      - "6379:6379"
    networks:
      - render_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend_go:
    build:
      context: ./backend/go
      dockerfile: Dockerfile
    container_name: render_go_server
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=render_dev
      - DB_USER=render_user
      - DB_PASSWORD=render_password_dev
      - REDIS_URL=redis://redis:6379
      - GO_PORT=8080
      - GO_ENV=development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - render_network

  backend_fastapi:
    build:
      context: ./backend/fastapi
      dockerfile: Dockerfile
    container_name: render_fastapi_server
    environment:
      - FASTAPI_PORT=8000
      - FASTAPI_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=render_dev
      - DB_USER=render_user
      - DB_PASSWORD=render_password_dev
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - render_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: render_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_FASTAPI_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend_go
      - backend_fastapi
    networks:
      - render_network

networks:
  render_network:
    driver: bridge

volumes:
  render_postgres_data:
